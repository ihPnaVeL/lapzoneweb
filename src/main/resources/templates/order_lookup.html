<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tra cứu hóa đơn | Lapzone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body style="background-color: #f4f7f6;">

<div th:replace="~{fragments/header :: header_lapzone}"></div>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4 p-4">
                <div class="text-center mb-4">
                    <i class="fas fa-search-dollar text-primary" style="font-size: 50px;"></i>
                    <h3 class="fw-bold mt-3">Tra Cứu Đơn Hàng</h3>
                    <p class="text-muted">Nhập mã đơn hàng và số điện thoại mua hàng để xem lại hóa đơn của bạn.</p>
                </div>

                <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>

                <form th:action="@{/tracuudonhang}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mã đơn hàng (#)</label>
                        <input type="number" name="orderId" class="form-control form-control-lg" required placeholder="Ví dụ: 15">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold">Số điện thoại đặt hàng</label>
                        <input type="tel" name="customerPhone" class="form-control form-control-lg" required placeholder="Nhập số điện thoại...">
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">
                        <i class="fas fa-search me-2"></i> TRA CỨU NGAY
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer_lapzone}"></div>

</body>
</html>
