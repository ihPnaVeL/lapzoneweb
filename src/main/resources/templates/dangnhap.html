<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Đăng Nhập - LAPZONE</title>
    <style>
        :root {
            --primary-color: #0884d1;
            --hover-color: #0665a0;
            --bg-color: #f4f7f6;
            --error-bg: #ffebee;
            --error-text: #d32f2f;
            --success-bg: #e8f5e9;
            --success-text: #2e7d32;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-card {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 8px;
            color: #333;
            font-size: 28px;
        }

        .login-card p {
            color: #777;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            font-size: 16px;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(8, 132, 209, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--hover-color);
        }

        /* Thông báo lỗi/thành công */
        .alert {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .alert-error {
            background-color: var(--error-bg);
            color: var(--error-text);
            border: 1px solid #ffcdd2;
        }
        .alert-success {
            background-color: var(--success-bg);
            color: var(--success-text);
            border: 1px solid #c8e6c9;
        }

        .extra-links {
            margin-top: 25px;
            font-size: 14px;
            color: #666;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .extra-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }

        .back-home {
            margin-top: 15px;
            display: inline-block;
            color: #999;
            text-decoration: none;
            font-size: 13px;
        }
        .back-home:hover { color: #333; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>ĐĂNG NHẬP</h2>
        <p>vui lòng điền tài khoản và mật khẩu của bạn</p>

        <div th:if="${param.error}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> Tài khoản hoặc mật khẩu không chính xác!
        </div>
        <div th:if="${error != null}" class="alert alert-error">
            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>
        <div th:if="${success != null}" class="alert alert-success">
            <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <form th:action="@{/dangnhap}" method="post" id="loginForm">
            <div class="form-group">
                <label>Tài khoản</label>
                <input type="text" name="emailOrPhone" id="emailOrPhone" placeholder="Email hoặc Số điện thoại">
                <small id="emailError" style="color: var(--error-text); display: none; margin-top: 5px; font-size: 13px;"><i class="fas fa-exclamation-circle"></i> Vui lòng nhập tài khoản!</small>
            </div>
            
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" name="password" id="password" placeholder="Nhập mật khẩu">
                <small id="passwordError" style="color: var(--error-text); display: none; margin-top: 5px; font-size: 13px;"><i class="fas fa-exclamation-circle"></i> Vui lòng nhập mật khẩu!</small>
            </div>

            <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
        </form>

        <script>
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                let isValid = true;
                const email = document.getElementById('emailOrPhone');
                const pass = document.getElementById('password');
                const emailError = document.getElementById('emailError');
                const passError = document.getElementById('passwordError');

                // Validate tài khoản
                if (!email.value.trim()) {
                    emailError.style.display = 'block';
                    email.style.borderColor = 'red';
                    isValid = false;
                } else {
                    emailError.style.display = 'none';
                    email.style.borderColor = '#ddd';
                }

                // Validate mật khẩu
                if (!pass.value.trim()) {
                    passError.style.display = 'block';
                    pass.style.borderColor = 'red';
                    isValid = false;
                } else {
                    passError.style.display = 'none';
                    pass.style.borderColor = '#ddd';
                }

                if (!isValid) {
                    e.preventDefault(); // Ngăn chặn submit form nếu có lỗi
                }
            });

            // Tự động ẩn lỗi khi người dùng bắt đầu gõ
            document.getElementById('emailOrPhone').addEventListener('input', function() {
                document.getElementById('emailError').style.display = 'none';
                this.style.borderColor = '#ddd';
            });
            document.getElementById('password').addEventListener('input', function() {
                document.getElementById('passwordError').style.display = 'none';
                this.style.borderColor = '#ddd';
            });
        </script>

        <div class="extra-links">
            Chưa có tài khoản? <a th:href="@{/dangki}">Tham gia Lapzone ngay</a>
        </div>

        <a th:href="@{/}" class="back-home"><i class="fas fa-chevron-left"></i> Quay lại trang chủ</a>
        <a th:href="@{/forgot-password}">Quên mật khẩu?</a>
    </div>

</body>
</html>
