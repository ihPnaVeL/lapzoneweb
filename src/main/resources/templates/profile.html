<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Cá Nhân - Lapzone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
     
        :root {
            --primary-color: #0884d1;
            --primary-hover: #066aab;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --border-color: #ddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }


        .profile-container {
            background: white;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .profile-container:hover {
            transform: translateY(-5px); 
        }

        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            background-color: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin: 0 auto 15px;
            box-shadow: 0 5px 15px rgba(8, 132, 209, 0.3);
        }

        .profile-header h2 {
            margin: 0;
            color: var(--primary-color);
            font-size: 24px;
        }

     
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }
        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

   
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group label i {
            color: var(--primary-color);
            margin-right: 8px;
            width: 16px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(8, 132, 209, 0.2);
        }

  
        .form-control[readonly] {
            background-color: #e9ecef;
            cursor: not-allowed;
            color: #666;
        }

   
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-save {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-save:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 4px 10px rgba(8, 132, 209, 0.3);
        }

        .btn-back {
            background-color: white;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .btn-back:hover {
            background-color: #f1f1f1;
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar">
                <i class="fas fa-user-astronaut"></i>
            </div>
            <h2>Thông Tin Tài Khoản</h2>
            <p style="color: #777; margin-top: 5px; font-size: 14px;">Quản lý thông tin cá nhân của bạn tại Lapzone</p>
        </div>

        <div th:if="${success}" th:text="${success}" class="alert alert-success"></div>
        <div th:if="${error}" th:text="${error}" class="alert alert-error"></div>

        <form th:action="@{/profile/update}" method="post" th:object="${userForm}">
              <input type="hidden" th:field="*{id}">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Địa chỉ Email</label>
    
                <input type="email" class="form-control" th:value="${user.email}" readonly title="Email đăng nhập không thể thay đổi">
            </div>

            <div class="form-group">
                <label><i class="fas fa-id-card"></i> Họ và tên</label>
                <input type="text" class="form-control" th:field="*{fullName}" placeholder="Nhập họ và tên...">
                <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"
                      style="color:#dc3545; font-size:13px; margin-top:4px; display:block;"></span>
            </div>

            <div class="form-group">
                <label><i class="fas fa-phone-alt"></i> Số điện thoại</label>
                <input type="text" class="form-control" th:field="*{phone}" placeholder="Nhập số điện thoại liên hệ...">
                <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"
                      style="color:#dc3545; font-size:13px; margin-top:4px; display:block;"></span>
            </div>

            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> Địa chỉ giao hàng</label>
                <input type="text" class="form-control" th:field="*{address}" placeholder="Nhập địa chỉ nhận laptop...">
                <span th:if="${#fields.hasErrors('address')}" th:errors="*{address}"
                      style="color:#dc3545; font-size:13px; margin-top:4px; display:block;"></span>
            </div>

            <div class="btn-group">
                <a th:href="@{/}" class="btn btn-back">
                    <i class="fas fa-arrow-left"></i> Về cửa hàng
                </a>
                <button type="submit" class="btn btn-save">
                    <i class="fas fa-save"></i> Lưu cập nhật
                </button>
            </div>
        </form>
    </div>

</body>
</html>
