<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt mật khẩu mới | Lapzone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="width: 400px; border-top: 4px solid #28a745;">
        <h3 class="text-center text-success mb-4 fw-bold">LAPZONE</h3>
        <h5 class="text-center mb-3">Tạo mật khẩu mới</h5>
        
        <div th:if="${message}" class="text-center">
            <div class="alert alert-success">[[${message}]]</div>
            <a th:href="@{/login}" class="btn btn-success w-100 fw-bold mt-2">Đi tới Đăng nhập</a>
        </div>
        
        <form th:if="${message == null}" th:action="@{/reset-password}" method="post">
            <input type="hidden" name="email" th:value="${verifiedEmail}">
            
            <div class="mb-4">
                <label class="form-label fw-bold">Mật khẩu mới</label>
                <input type="password" name="newPassword" class="form-control" required minlength="6" placeholder="Nhập mật khẩu mới (ít nhất 6 ký tự)...">
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold py-2">Lưu Mật Khẩu</button>
        </form>
    </div>
</body>
</html>
