<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Khách hàng | Lapzone Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Định dạng ghim cứng cho Sidebar bên trái */
        .sidebar {
            width: 260px;
            height: 100vh;
            background-color: #2c3e50 !important; /* Màu tối chuẩn Admin */
            color: #ffffff;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        .sidebar-header {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            padding: 25px 0;
            letter-spacing: 1.5px;
            color: #11caa0;
            border-bottom: 1px solid #34495e;
            background-color: #1a252f;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px 25px;
            color: #ecf0f1;
            text-decoration: none;
            font-size: 15px;
            transition:建设 all 0.3s ease;
        }

        .menu-item i {
            width: 24px;
            font-size: 16px;
            text-align: center;
        }

        .menu-item:hover, .menu-item:focus {
            background-color: #34495e;
            color: #11caa0;
            text-decoration: none;
            padding-left: 30px;
        }

        /* Vùng nội dung chính bên phải - tự động lùi vào 260px để không bị menu đè lên */
        .main-content {
            margin-left: 260px;
            padding: 40px;
            min-height: 100vh;
            width: calc(100% - 260px);
        }
        
        .card {
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div th:replace="~{admin/sidebar :: adminSidebar}"></div>
    
    <div class="main-content">
        
        <div class="card shadow border-0">
            <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                <h5 class="m-0 fw-bold text-dark">
                    <i class="fas fa-users-cog me-2"></i> QUẢN LÝ NGƯỜI DÙNG &amp; PHÂN QUYỀN
                </h5>
                <span class="badge bg-secondary fs-6" th:text="'Tổng: ' + ${totalElements} + ' tài khoản'"></span>
            </div>
            <div class="card-body p-4">

                <!-- [MỚI] Form tìm kiếm -->
                <form th:action="@{/admin/users}" method="GET" class="row g-2 mb-3">
                    <div class="col-md-5">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-search"></i></span>
                            <input type="text" name="keyword" th:value="${keyword}"
                                   class="form-control" placeholder="Tìm theo tên, email, số điện thoại...">
                        </div>
                    </div>
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-filter me-1"></i> Tìm</button>
                        <a th:href="@{/admin/users}" class="btn btn-outline-secondary ms-1">Xóa bộ lọc</a>
                    </div>
                </form>

                <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                    <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-hover align-middle border-top">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 80px;">ID</th>
                                <th>Họ và Tên</th>
                                <th>Email</th>
                                <th>Số điện thoại</th>
                                <th style="width: 260px;">Quyền hạn</th>
                                <th class="text-center" style="width: 120px;">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="user : ${users}">
                                <td th:text="${user.id}" class="fw-bold text-secondary"></td>
                                <td th:text="${user.fullName}" class="fw-semibold text-dark"></td>
                                <td th:text="${user.email}"></td>
                                <td th:text="${user.phone}"></td>
                                <td>
                                    <form th:action="@{/admin/users/update-role}" method="post" class="d-flex align-items-center gap-2">
                                        <input type="hidden" name="userId" th:value="${user.id}">
                                        <select name="role" class="form-select form-select-sm shadow-sm" style="width: 140px;">
                                            <option value="USER" th:selected="${user.role == 'USER'}">Khách hàng</option>
                                            <option value="ADMIN" th:selected="${user.role == 'ADMIN'}">Quản trị (Admin)</option>
                                        </select>
                                        <button type="submit" class="btn btn-sm btn-success px-3 shadow-sm">
                                            <i class="fas fa-save me-1"></i> Lưu
                                        </button>
                                    </form>
                                </td>
                                <td class="text-center">
                                    <form th:action="@{/admin/users/delete}" method="post" onsubmit="return confirm('Bạn có chắc chắn muốn xóa người dùng này không? Hành động này không thể hoàn tác!')" class="m-0">
                                        <input type="hidden" name="userId" th:value="${user.id}">
                                        <button type="submit" class="btn btn-sm btn-danger px-3 shadow-sm">
                                            <i class="fas fa-trash-alt me-1"></i> Xóa
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- [MỚI] Thanh phân trang -->
                <div class="d-flex justify-content-between align-items-center mt-3" th:if="${totalPages > 0}">
                    <span class="text-muted small">
                        Hiển thị <strong th:text="${currentPage * 20 + 1}"></strong>
                        đến <strong th:text="${(currentPage + 1) * 20 > totalElements ? totalElements : (currentPage + 1) * 20}"></strong>
                        trong tổng số <strong th:text="${totalElements}"></strong> tài khoản
                    </span>
                    <nav>
                        <ul class="pagination pagination-sm mb-0">
                            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{/admin/users(page=${currentPage - 1}, size=20, keyword=${keyword})}">
                                    &laquo; Trước
                                </a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                                th:classappend="${i == currentPage} ? 'active'"
                                th:if="${i <= 4 or i >= totalPages - 2 or (i >= currentPage - 1 and i <= currentPage + 1)}">
                                <a class="page-link"
                                   th:href="@{/admin/users(page=${i}, size=20, keyword=${keyword})}"
                                   th:text="${i + 1}"></a>
                            </li>
                            <li class="page-item" th:classappend="${currentPage >= totalPages - 1} ? 'disabled'">
                                <a class="page-link"
                                   th:href="@{/admin/users(page=${currentPage + 1}, size=20, keyword=${keyword})}">
                                    Sau &raquo;
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>
                <!-- /phân trang -->
                
            </div>
        </div> </div> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
