<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Sản phẩm - LAPZONE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <style>
        /* --- ĐỒNG BỘ CSS SIDEBAR CỐ ĐỊNH CHUẨN FORM ADMIN --- */
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; }
        
        .sidebar {
            width: 260px; height: 100vh; background-color: #2c3e50 !important; color: #ffffff;
            position: fixed; top: 0; left: 0; display: flex; flex-direction: column; z-index: 1000;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }
        .sidebar-header {
            font-size: 20px; font-weight: 700; text-align: center; padding: 25px 0; letter-spacing: 1.5px; 
            color: #11caa0; border-bottom: 1px solid #34495e; background-color: #1a252f;
        }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 15px 25px; color: #ecf0f1; text-decoration: none; font-size: 15px; transition: all 0.3s ease; }
        .menu-item i { width: 24px; font-size: 16px; text-align: center; }
        .menu-item:hover, .menu-item:focus { background-color: #34495e; color: #11caa0; text-decoration: none; padding-left: 30px; }

        /* Khung nội dung lùi vào 260px */
        .main-content { margin-left: 260px; width: calc(100% - 260px); padding: 30px; }

        /* --- CSS CUSTOM GỐC TỪ FILE WORD CỦA BẠN --- */
        .top-bar { background: white; padding: 15px 30px; margin: -30px -30px 30px -30px; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .section-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .img-thumbnail-custom { width: 60px; height: 40px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>

    <div th:replace="~{admin/sidebar :: adminSidebar}"></div>

    <div class="main-content">
        
        <div class="top-bar">
            <div class="fw-bold text-dark">Quản lý kho Laptop</div>
            <div class="admin-profile">
                <i class="fas fa-user-circle"></i> Admin: <span th:text="${session.currentUser != null ? session.currentUser.fullName : 'Admin'}"></span>
            </div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="section-card">
            <h4 class="mb-4" th:text="${product.id == null ? ' ➕  Thêm Laptop Mới' : ' ✏️  Cập Nhật Laptop'}"></h4>
            
            <form th:action="@{/admin/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:field="*{id}" />
                <input type="hidden" th:field="*{image}" />
                <input type="hidden" th:field="*{productDetail.id}" />
                
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Tên máy tính</label>
                        <input type="text" th:field="*{name}" class="form-control" required placeholder="VD: Dell XPS 13...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Giá bán (VNĐ)</label>
                        <input type="number" id="price" name="price"
                               th:value="${product.price != null ? product.price.longValue() : ''}"
                               class="form-control" required>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label fw-bold">Số lượng</label>
                        <input type="number" th:field="*{stock}" class="form-control" required min="1">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Hãng</label>
                        <select th:field="*{category.id}" class="form-select" required>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>
                    
                    <div class="col-md-3">
                        <label class="form-label fw-bold">CPU</label>
                        <input type="text" th:field="*{productDetail.cpu}" class="form-control" placeholder="i5 13th, M3...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">RAM</label>
                        <input type="text" th:field="*{productDetail.ram}" class="form-control" placeholder="8GB, 16GB...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">GPU (Card đồ họa)</label>
                        <input type="text" th:field="*{productDetail.gpu}" class="form-control" placeholder="RTX 4050, Onboard...">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Màn hình</label>
                        <input type="text" th:field="*{productDetail.screen}" class="form-control" placeholder="14 inch, 2K...">
                    </div>
                    
                    <div class="col-md-12">
                        <label class="form-label fw-bold">Phân loại nhu cầu (Từ khóa tìm kiếm)</label>
                        <input type="text" th:field="*{productDetail.moreInfo}" class="form-control text-primary fw-bold" placeholder="VD: Gaming, Văn Phòng, Cao Cấp, Đồ Họa (Dùng để phân loại trên trang chủ)">
                    </div>
                    
                    <div class="col-md-4">
                        <label class="form-label fw-bold text-primary">1. Ảnh đại diện chính</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label fw-bold text-success">2. Bộ 4 ảnh chi tiết (Sub-images)</label>
                        <div class="d-flex gap-1">
                            <input type="file" name="subImages" class="form-control form-control-sm" accept="image/*">
                            <input type="file" name="subImages" class="form-control form-control-sm" accept="image/*">
                            <input type="file" name="subImages" class="form-control form-control-sm" accept="image/*">
                            <input type="file" name="subImages" class="form-control form-control-sm" accept="image/*">
                        </div>
                    </div>
                    
                    <div class="col-12 mt-4 text-end">
                        <a th:href="@{/admin/products}" class="btn btn-light border">Hủy bỏ</a>
                        <button type="submit" class="btn btn-primary px-4"
                            th:text="${product.id == null ? ' ➕  Thêm sản phẩm' : ' ✏️  Cập nhật sản phẩm'}">
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <div class="section-card">
            <h4 class="mb-4"> 📦  Danh sách kho hàng</h4>
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Ảnh</th>
                        <th>Tên máy</th>
                        <th>Giá</th>
                        <th>Hãng</th>
                        <th>Cấu hình</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${products}">
                        <td>
                            <img loading="lazy" th:if="${p.image != null and !p.image.isEmpty()}"
                                 th:src="@{${p.image.startsWith('assets/') ? '/' + p.image : '/assets/' + p.image}}"
                                 class="img-thumbnail-custom"
                                 alt="Ảnh Laptop">

                            <img loading="lazy" th:unless="${p.image != null and !p.image.isEmpty()}"
                                 th:src="@{/assets/no-image.png}"
                                 class="img-thumbnail-custom">
                        </td>
                        <td th:text="${p.name}" class="fw-bold"></td>
                        <td th:text="${p.price != null ? #numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT') + 'đ' : '0đ'}"></td>

                        <td th:text="${p.category != null ? p.category.name : 'Chưa phân loại'}"></td>

                        <td class="small">
                            <span class="badge bg-secondary" th:text="${p.productDetail != null ? p.productDetail.cpu : 'Chưa có CPU'}"></span>
                            <span class="badge bg-secondary" th:text="${p.productDetail != null ? p.productDetail.ram : 'Chưa có RAM'}"></span>
                        </td>

                        <td>
                            <a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></a>
                            <a th:href="@{/admin/products/delete/{id}(id=${p.id})}" class="btn btn-sm btn-danger" onclick="return confirm('Xóa máy này?')"><i class="fas fa-trash"></i></a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
    </div>

</body>
</html>
