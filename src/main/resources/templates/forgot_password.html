<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Khôi phục mật khẩu | Lapzone</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow p-4" style="width: 400px; border-top: 4px solid #d32f2f;">
        <h3 class="text-center text-danger mb-4 fw-bold">LAPZONE</h3>
        <h5 class="text-center mb-3">Xác minh tài khoản</h5>
        
        <div th:if="${error}" class="alert alert-danger text-center">[[${error}]]</div>
        
        <form th:action="@{/verify-phone}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">Email đăng nhập</label>
                <input type="email" name="email" class="form-control" required placeholder="Nhập email...">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Số điện thoại đăng ký</label>
                <input type="text" name="phoneNumber" class="form-control" required placeholder="Nhập số điện thoại...">
            </div>
            <button type="submit" class="btn btn-danger w-100 fw-bold py-2">Xác Nhận & Tiếp Tục</button>
            <div class="text-center mt-3">
                <a th:href="@{/login}" class="text-decoration-none text-secondary">Quay lại Đăng nhập</a>
            </div>
        </form>
    </div>
</body>
</html>
